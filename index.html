<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0b0d;
      --surface: #111115;
      --card: #16161c;
      --border: rgba(255,255,255,0.06);
      --accent: #c8a96e;
      --accent-dim: rgba(200,169,110,0.15);
      --text: #e8e4dc;
      --muted: #7a7670;
      --hover-lift: -6px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Noise grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2.4rem 5vw;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(11,11,13,0.88);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    nav {
      display: flex;
      gap: 2.5rem;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    nav a {
      color: inherit;
      text-decoration: none;
      transition: color 0.25s;
    }

    nav a:hover { color: var(--accent); }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 7rem 5vw 5rem;
      position: relative;
    }

    .hero::after {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 4rem;
      background: linear-gradient(to bottom, transparent, var(--accent));
    }

    .hero-eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.4rem;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .hero h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-sub {
      margin-top: 1.4rem;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── Filter Bar ── */
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding: 2rem 5vw 3.5rem;
    }

    .filter-btn {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.55rem 1.4rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.25s;
    }

    .filter-btn.active,
    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* ── Product Grid ── */
    .grid-section {
      padding: 0 5vw 8rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1.5px;
    }

    /* ── Product Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.23,1,0.32,1),
                  border-color 0.3s, box-shadow 0.4s;
      animation: fadeUp 0.6s ease both;
    }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.2s; }
    .card:nth-child(5) { animation-delay: 0.25s; }
    .card:nth-child(6) { animation-delay: 0.3s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      transform: translateY(var(--hover-lift));
      border-color: rgba(200,169,110,0.3);
      box-shadow: 0 24px 48px rgba(0,0,0,0.55), 0 0 0 1px rgba(200,169,110,0.1);
      z-index: 2;
    }

    /* Image container */
    .card-img {
      aspect-ratio: 3/4;
      overflow: hidden;
      position: relative;
      background: #1a1a20;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.7s cubic-bezier(0.23,1,0.32,1), filter 0.4s;
      filter: saturate(0.6) brightness(0.85);
    }

    .card:hover .card-img img {
      transform: scale(1.06);
      filter: saturate(0.8) brightness(0.95);
    }

    /* Overlay on hover */
    .card-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(11,11,13,0.85) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.35s;
    }

    .card:hover .card-img::after { opacity: 1; }

    /* Quick-view pill */
    .quick-view {
      position: absolute;
      bottom: 1.2rem;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.45rem 1.2rem;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 3;
    }

    .card:hover .quick-view {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Badge */
    .badge {
      position: absolute;
      top: 1rem;
      left: 1rem;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.3rem 0.7rem;
      z-index: 2;
    }

    .badge.new  { background: var(--accent); color: #0b0b0d; }
    .badge.sale { background: #7a3b3b; color: #f0d0d0; }
    .badge.custom {
      background: rgba(200,169,110,0.18);
      color: var(--accent);
      border: 1px solid rgba(200,169,110,0.35);
    }

    /* Card body */
    .card-body {
      padding: 1.4rem 1.5rem 1.6rem;
      border-top: 1px solid var(--border);
    }

    .card-category {
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 400;
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .card-desc {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.9rem;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .price {
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .price-old {
      font-size: 0.72rem;
      color: var(--muted);
      text-decoration: line-through;
      margin-right: 0.5rem;
    }

    .add-btn {
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s;
      line-height: 1;
    }

    .add-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* ── Loading / Error states ── */
    .state-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 0;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .state-msg .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 1px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 3rem 5vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .footer-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer-copy {
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      nav { display: none; }
      .hero { padding: 5rem 5vw 3.5rem; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 1px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">The<span>·</span>Collection</div>
    <nav>
      <a href="#">New Arrivals</a>
      <a href="#">Catalogue</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <p class="hero-eyebrow">Season 2025 — Curated Pieces</p>
    <h1>Crafted with <em>intention</em>,<br>worn with purpose.</h1>
    <p class="hero-sub" id="heroSub">Loading collection…</p>
  </section>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" onclick="filterCards('all', this)">All</button>
    <!-- category buttons injected dynamically -->
  </div>

  <section class="grid-section">
    <div class="grid" id="productGrid">
      <div class="state-msg">
        <div class="spinner"></div><br>Loading collection…
      </div>
    </div>
  </section>

  <footer>
    <div class="footer-logo">The · Collection</div>
    <div class="footer-copy">© 2025 · All rights reserved</div>
  </footer>

  <script>
    // ── CSV helpers ──────────────────────────────────────────────────────────

    const CSV_URL =
      'https://docs.google.com/spreadsheets/d/e/2PACX-1vRixMkmkClVqiVOs1QPLP6lrILhygw-ATbplCvwlxuRqmzj-QQy21lgH_53I1InfZsaJUCRs7A-ua_1/pub?output=csv';

    /**
     * Minimal RFC-4180 CSV parser.
     * Handles quoted fields (including commas & newlines inside quotes).
     * Returns an array of objects keyed by the header row.
     */
    function parseCSV(text) {
      const rows = [];
      let col = '', row = [], inQ = false;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i], next = text[i + 1];

        if (inQ) {
          if (ch === '"' && next === '"') { col += '"'; i++; }
          else if (ch === '"') { inQ = false; }
          else { col += ch; }
        } else {
          if (ch === '"') { inQ = true; }
          else if (ch === ',') { row.push(col.trim()); col = ''; }
          else if (ch === '\n' || (ch === '\r' && next === '\n')) {
            row.push(col.trim()); col = '';
            rows.push(row); row = [];
            if (ch === '\r') i++;
          } else { col += ch; }
        }
      }
      if (col || row.length) { row.push(col.trim()); rows.push(row); }

      const headers = rows[0].map(h => h.toLowerCase().replace(/\s+/g, ''));
      return rows.slice(1)
        .filter(r => r.some(c => c))
        .map(r => Object.fromEntries(headers.map((h, i) => [h, r[i] || ''])));
    }

    // ── Badge helpers ────────────────────────────────────────────────────────

    function badgeClass(raw) {
      const v = (raw || '').toLowerCase().trim();
      if (v === 'new')  return 'new';
      if (v === 'sale' || v === 'sales') return 'sale';
      if (v) return 'custom';
      return '';
    }

    function badgeLabel(raw) {
      const v = (raw || '').trim();
      if (!v) return '';
      if (v.toLowerCase() === 'sales') return 'Sale';
      return v.charAt(0).toUpperCase() + v.slice(1);
    }

    // ── Card builder ─────────────────────────────────────────────────────────

    function buildCard(p, index) {
      const cat       = (p['card-category'] || p['cardcategory'] || '').trim().toLowerCase();
      const name      = (p['card-name']     || p['cardname']     || 'Untitled').trim();
      const desc      = (p['desc']          || '').trim();
      const price     = (p['price']         || '').trim();
      const origPrice = (p['originalprice'] || p['original price'] || '').trim();
      const badge     = (p['badge']         || '').trim();
      const img       = (p['img']           || '').trim();

      const bc    = badgeClass(badge);
      const label = badgeLabel(badge);

      const badgeHTML = bc
        ? `<span class="badge ${bc}">${label}</span>` : '';

      const priceHTML = origPrice
        ? `<div><span class="price-old">${origPrice}</span><span class="price">${price}</span></div>`
        : `<span class="price">${price}</span>`;

      const descHTML = desc
        ? `<p class="card-desc">${desc}</p>` : '';

      // Stagger animation delay for the first 12 cards
      const delay = (index + 1) * 0.05;
      const style = index < 12 ? ` style="animation-delay:${delay}s"` : '';

      return `
        <div class="card" data-cat="${cat}"${style}>
          <div class="card-img">
            <img src="${img}" alt="${name}" loading="lazy" onerror="this.style.opacity='0.15'"/>
            ${badgeHTML}
            <span class="quick-view">Quick View</span>
          </div>
          <div class="card-body">
            <p class="card-category">${cat}</p>
            <p class="card-name">${name}</p>
            ${descHTML}
            <div class="card-footer">
              ${priceHTML}
              <button class="add-btn" title="Add to cart">+</button>
            </div>
          </div>
        </div>`;
    }

    // ── Filter bar ───────────────────────────────────────────────────────────

    function buildFilterBar(products) {
      const cats = [...new Set(
        products.map(p =>
          (p['card-category'] || p['cardcategory'] || '').trim().toLowerCase()
        ).filter(Boolean)
      )];

      const bar = document.getElementById('filterBar');
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        btn.onclick = function() { filterCards(cat, this); };
        bar.appendChild(btn);
      });
    }

    // ── Filter logic ─────────────────────────────────────────────────────────

    function filterCards(cat, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.card').forEach(card => {
        const match = cat === 'all' || card.dataset.cat === cat;
        card.style.display = match ? '' : 'none';
      });
    }

    // ── Add-to-cart interaction ───────────────────────────────────────────────

    function bindAddButtons() {
      document.querySelectorAll('.add-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          this.textContent = '✓';
          this.style.borderColor = 'var(--accent)';
          this.style.color = 'var(--accent)';
          setTimeout(() => {
            this.textContent = '+';
            this.style.borderColor = '';
            this.style.color = '';
          }, 1200);
        });
      });
    }

    // ── Main fetch & render ──────────────────────────────────────────────────

    async function loadProducts() {
      const grid = document.getElementById('productGrid');

      try {
        const res = await fetch(CSV_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const products = parseCSV(text);

        if (!products.length) throw new Error('No products found in sheet');

        // Render cards
        grid.innerHTML = products.map((p, i) => buildCard(p, i)).join('');

        // Update hero subtitle
        document.getElementById('heroSub').textContent =
          `${products.length} signature pieces · Limited availability`;

        // Build dynamic category filter buttons
        buildFilterBar(products);

        // Bind cart interactions
        bindAddButtons();

      } catch (err) {
        grid.innerHTML = `
          <div class="state-msg">
            Unable to load collection — ${err.message}
          </div>`;
        console.error('[Collection] fetch error:', err);
      }
    }

    loadProducts();
  </script>

</body>
</html>
